<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Toddler Time</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
  html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; background: #000; font-family: 'Fredoka', 'Comic Sans MS', system-ui, sans-serif; }
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap');

  :root {
    --red: #FF1744;
    --blue: #2962FF;
    --yellow: #FFD600;
    --green: #00C853;
    --purple: #AA00FF;
    --orange: #FF6D00;
  }

  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }

  /* ===== MENU ===== */
  .menu { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 24px;
    background: radial-gradient(circle at 20% 20%, var(--yellow) 0%, transparent 40%),
                radial-gradient(circle at 80% 30%, var(--red) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, var(--blue) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, var(--green) 0%, transparent 40%),
                #1a1a2e;
    background-size: 200% 200%;
    animation: bgShift 12s ease infinite;
  }
  @keyframes bgShift { 0%,100% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } }

  .title { font-size: clamp(40px, 9vw, 80px); font-weight: 700; color: white; text-shadow: 0 0 30px rgba(255,255,255,0.5), 4px 4px 0 var(--red), 8px 8px 0 var(--blue); letter-spacing: 2px; text-align: center; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; width: 100%; max-width: 480px; }
  .grid .tile.game { grid-column: span 2; aspect-ratio: 2.2 / 1; }

  .tile { aspect-ratio: 1; border: none; border-radius: 28px; font-size: 22px; font-weight: 700; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 8px 0 rgba(0,0,0,0.3), 0 12px 24px rgba(0,0,0,0.3); transition: transform 0.1s; position: relative; overflow: hidden; }
  .tile:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 6px 12px rgba(0,0,0,0.3); }
  .tile .emoji { font-size: 56px; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.2)); }
  .tile.video1 { background: var(--red); }
  .tile.video2 { background: var(--blue); }
  .tile.video3 { background: var(--green); }
  .tile.video4 { background: var(--purple); }
  .tile.game { background: var(--yellow); color: #222; }

  /* ===== VIDEO VIEW ===== */
  .video-view { position: absolute; inset: 0; background: #000; display: none; }
  .video-view.active { display: block; }
  .video-view iframe { width: 100%; height: 100%; border: 0; }
  /* Tap-blocker overlay so toddler taps don't hit YouTube UI */
  .video-blocker { position: absolute; inset: 0; z-index: 5; }

  /* ===== GAME VIEW ===== */
  .game-view { position: absolute; inset: 0; display: none; background: #0a0a1a; overflow: hidden; touch-action: none; }
  .game-view.active { display: block; }
  .game-canvas { position: absolute; inset: 0; }
  .rainbow-canvas { position: absolute; inset: 0; pointer-events: none; }
  .game-bg { position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,23,68,0.4), transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(41,98,255,0.4), transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255,214,0,0.3), transparent 60%),
                #0a0a1a;
  }

  /* Tiny particles emitted while finger is held */
  .spark { position: absolute; pointer-events: none; width: 16px; height: 16px; border-radius: 50%; transform: translate(-50%, -50%); animation: sparkFly 1s ease-out forwards; box-shadow: 0 0 12px currentColor; }
  @keyframes sparkFly {
    0% { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.1); opacity: 0; }
  }
  .mini-emoji { position: absolute; pointer-events: none; font-size: 28px; transform: translate(-50%, -50%); animation: miniFly 1.1s ease-out forwards; }
  @keyframes miniFly {
    0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(var(--rot)); opacity: 0; }
  }

  /* ===== EXIT BUTTON (hidden, requires long-press to exit) ===== */
  .exit-zone { position: absolute; top: 0; right: 0; width: 80px; height: 80px; z-index: 100; }
  .exit-progress { position: absolute; top: 12px; right: 12px; width: 56px; height: 56px; border-radius: 50%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 101; }
  .exit-progress.showing { opacity: 1; }
  .exit-progress svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .exit-progress circle { fill: none; stroke: white; stroke-width: 4; }
  .exit-progress .track { stroke: rgba(255,255,255,0.2); }
  .exit-progress .fill { stroke-dasharray: 157; stroke-dashoffset: 157; transition: stroke-dashoffset 0.05s linear; }
  .exit-icon { position: absolute; color: white; font-size: 22px; font-weight: 700; }

  /* ===== ANIMATIONS (game taps) ===== */
  .pop { position: absolute; pointer-events: none; font-size: 80px; animation: popOut 1.2s ease-out forwards; transform: translate(-50%, -50%); }
  @keyframes popOut {
    0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
    20% { transform: translate(-50%, -50%) scale(1.4) rotate(20deg); }
    100% { transform: translate(-50%, -50%) scale(1.8) rotate(360deg); opacity: 0; }
  }
  .bubble { position: absolute; pointer-events: none; border-radius: 50%; transform: translate(-50%, -50%); animation: bubbleUp 1.5s ease-out forwards; box-shadow: inset -8px -8px 16px rgba(0,0,0,0.2), inset 4px 4px 8px rgba(255,255,255,0.5); }
  @keyframes bubbleUp {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
    50% { opacity: 0.9; }
    100% { transform: translate(-50%, calc(-50% - 200px)) scale(1.3); opacity: 0; }
  }
  .confetti { position: absolute; pointer-events: none; width: 14px; height: 14px; transform: translate(-50%, -50%); animation: confettiFall 1.4s ease-out forwards; }
  @keyframes confettiFall {
    0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(720deg); opacity: 0; }
  }
  .firework { position: absolute; pointer-events: none; width: 8px; height: 8px; border-radius: 50%; transform: translate(-50%, -50%); animation: fireworkBurst 0.9s ease-out forwards; }
  @keyframes fireworkBurst {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; box-shadow: 0 0 20px currentColor; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.3); opacity: 0; box-shadow: 0 0 40px currentColor; }
  }

  .back-btn { position: absolute; top: 12px; left: 12px; z-index: 100; width: 56px; height: 56px; border-radius: 50%; background: rgba(0,0,0,0.5); color: white; border: 2px solid rgba(255,255,255,0.3); font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="app">

  <!-- MENU -->
  <div class="menu" id="menu">
    <div class="title">Bamse &amp; Kylling</div>
    <div class="grid" id="grid">
      <button class="tile game" id="gameBtn"><span class="emoji">🎮</span><span>Tap Game</span></button>
    </div>
  </div>

  <!-- VIDEO VIEW -->
  <div class="video-view" id="videoView">
    <iframe id="ytFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <div class="video-blocker"></div>
    <div class="exit-zone" data-exit></div>
    <div class="exit-progress" id="exitProgress1">
      <svg viewBox="0 0 60 60"><circle class="track" cx="30" cy="30" r="25"/><circle class="fill" cx="30" cy="30" r="25"/></svg>
      <span class="exit-icon">×</span>
    </div>
  </div>

  <!-- GAME VIEW -->
  <div class="game-view" id="gameView">
    <div class="game-bg"></div>
    <canvas class="rainbow-canvas" id="rainbowCanvas"></canvas>
    <div class="game-canvas" id="gameCanvas"></div>
    <div class="exit-zone" data-exit></div>
    <div class="exit-progress" id="exitProgress2">
      <svg viewBox="0 0 60 60"><circle class="track" cx="30" cy="30" r="25"/><circle class="fill" cx="30" cy="30" r="25"/></svg>
      <span class="exit-icon">×</span>
    </div>
  </div>

</div>

<script>
// ============================================
// CONFIG — replace these YouTube IDs with your own
// To get an ID: from https://www.youtube.com/watch?v=ABC123 the ID is "ABC123"
// ============================================
const VIDEOS = [
  { id: '4m_qHSRSeIU', title: 'Jodlesangen', emoji: '🎵' },
  { id: 'MrdvKm9Nx7M', title: 'Brum Brum',   emoji: '🚗' },
  { id: '21ZYqu7AC1c', title: 'Okay Okay',   emoji: '🎺' },
  { id: 'JYT8D9nMGH4', title: 'Bamses Sang', emoji: '🐻' },
];

// ============================================
// SOUND (Web Audio — fun beeps & boops, no files needed)
// ============================================
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playBlip() {
  if (!audioCtx) return;
  const notes = [523, 587, 659, 698, 784, 880, 988, 1047]; // C major scale
  const freq = notes[Math.floor(Math.random() * notes.length)];
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = ['sine', 'triangle', 'square'][Math.floor(Math.random() * 3)];
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}
function playMenuBlip() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(660, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.2);
}

// ============================================
// VIEWS
// ============================================
const menu = document.getElementById('menu');
const videoView = document.getElementById('videoView');
const gameView = document.getElementById('gameView');
const ytFrame = document.getElementById('ytFrame');

function showMenu() {
  menu.style.display = 'flex';
  videoView.classList.remove('active');
  gameView.classList.remove('active');
  ytFrame.src = ''; // stop video
  // Clear rainbow trail and any active pointers
  if (typeof rctx !== 'undefined') rctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  if (typeof pointers !== 'undefined') pointers.clear();
}
function showVideo(idx) {
  initAudio();
  const id = VIDEOS[idx].id;
  // playlist=ID makes a single video loop; loop=1 + playlist=ID is the trick
  ytFrame.src = `https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&controls=0&modestbranding=1&rel=0&playsinline=1&iv_load_policy=3`;
  menu.style.display = 'none';
  videoView.classList.add('active');
  tryFullscreen();
}
function showGame() {
  initAudio();
  menu.style.display = 'none';
  gameView.classList.add('active');
  tryFullscreen();
}

// Build video tiles dynamically from VIDEOS array
const grid = document.getElementById('grid');
const gameBtnEl = document.getElementById('gameBtn');
VIDEOS.forEach((v, i) => {
  const btn = document.createElement('button');
  btn.className = `tile video${i + 1}`;
  btn.dataset.video = i;
  btn.innerHTML = `<span class="emoji">${v.emoji}</span><span>${v.title}</span>`;
  btn.addEventListener('click', () => { initAudio(); playMenuBlip(); showVideo(i); });
  grid.insertBefore(btn, gameBtnEl);
});
gameBtnEl.addEventListener('click', () => { initAudio(); playMenuBlip(); showGame(); });

// ============================================
// FULLSCREEN
// ============================================
function tryFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  // Lock orientation if supported
  if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
}

// ============================================
// EXIT — long press top-right corner for 2 seconds
// ============================================
const EXIT_DURATION = 2000;
document.querySelectorAll('[data-exit]').forEach(zone => {
  let timer = null;
  let startTime = 0;
  let raf = null;
  const view = zone.closest('.video-view, .game-view');
  const progress = view.querySelector('.exit-progress');
  const fill = progress.querySelector('.fill');

  function start(e) {
    e.preventDefault();
    startTime = Date.now();
    progress.classList.add('showing');
    function tick() {
      const elapsed = Date.now() - startTime;
      const pct = Math.min(elapsed / EXIT_DURATION, 1);
      fill.style.strokeDashoffset = 157 * (1 - pct);
      if (pct < 1) raf = requestAnimationFrame(tick);
      else { showMenu(); cleanup(); }
    }
    raf = requestAnimationFrame(tick);
  }
  function cleanup() {
    cancelAnimationFrame(raf);
    progress.classList.remove('showing');
    fill.style.strokeDashoffset = 157;
  }
  zone.addEventListener('touchstart', start, { passive: false });
  zone.addEventListener('mousedown', start);
  ['touchend', 'touchcancel', 'mouseup', 'mouseleave'].forEach(ev => zone.addEventListener(ev, cleanup));
});

// ============================================
// GAME — animations on tap
// ============================================
const canvas = document.getElementById('gameCanvas');
const COLORS = ['#FF1744', '#2962FF', '#FFD600', '#00C853', '#AA00FF', '#FF6D00', '#00E5FF', '#F50057'];
const EMOJIS = ['⭐', '🌟', '💫', '✨', '🎈', '🎉', '🐶', '🐱', '🐰', '🦄', '🐸', '🐵', '🦋', '🌈', '🎨', '🚀', '🍭', '🎂', '⚽', '🏀'];

function rand(min, max) { return Math.random() * (max - min) + min; }
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function spawnEffect(x, y) {
  const type = Math.floor(Math.random() * 4);
  if (type === 0) spawnPop(x, y);
  else if (type === 1) spawnBubble(x, y);
  else if (type === 2) spawnConfetti(x, y);
  else spawnFirework(x, y);
}

function spawnPop(x, y) {
  const el = document.createElement('div');
  el.className = 'pop';
  el.textContent = pickRandom(EMOJIS);
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  canvas.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function spawnBubble(x, y) {
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'bubble';
    const size = rand(40, 90);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = (x + rand(-30, 30)) + 'px';
    el.style.top = y + 'px';
    el.style.background = pickRandom(COLORS);
    el.style.animationDelay = (i * 80) + 'ms';
    canvas.appendChild(el);
    setTimeout(() => el.remove(), 1700);
  }
}

function spawnConfetti(x, y) {
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.background = pickRandom(COLORS);
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    const angle = rand(0, Math.PI * 2);
    const dist = rand(80, 200);
    el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    canvas.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

function spawnFirework(x, y) {
  const color = pickRandom(COLORS);
  for (let i = 0; i < 16; i++) {
    const el = document.createElement('div');
    el.className = 'firework';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.background = color;
    el.style.color = color;
    const angle = (i / 16) * Math.PI * 2;
    const dist = rand(100, 180);
    el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    canvas.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
}

function handleGameTap(x, y) {
  spawnEffect(x, y);
  playBlip();
}

// ============================================
// RAINBOW TRAIL CANVAS (drag to draw)
// ============================================
const rainbowCanvas = document.getElementById('rainbowCanvas');
const rctx = rainbowCanvas.getContext('2d');

function resizeRainbow() {
  const dpr = window.devicePixelRatio || 1;
  rainbowCanvas.width = window.innerWidth * dpr;
  rainbowCanvas.height = window.innerHeight * dpr;
  rainbowCanvas.style.width = window.innerWidth + 'px';
  rainbowCanvas.style.height = window.innerHeight + 'px';
  rctx.scale(dpr, dpr);
  rctx.lineCap = 'round';
  rctx.lineJoin = 'round';
}
resizeRainbow();
window.addEventListener('resize', resizeRainbow);

// Per-pointer state: last position + hue offset so each finger gets its own rainbow
const pointers = new Map(); // pointerId -> { x, y, hue, lastSpawn }

function drawRainbowSegment(p, x, y) {
  const dx = x - p.x;
  const dy = y - p.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const steps = Math.max(1, Math.ceil(dist / 4));
  for (let i = 0; i < steps; i++) {
    const t = (i + 1) / steps;
    const sx = p.x + dx * t;
    const sy = p.y + dy * t;
    p.hue = (p.hue + 4) % 360;
    rctx.strokeStyle = `hsl(${p.hue}, 100%, 60%)`;
    rctx.lineWidth = 14;
    rctx.shadowBlur = 18;
    rctx.shadowColor = `hsl(${p.hue}, 100%, 70%)`;
    rctx.beginPath();
    if (i === 0) rctx.moveTo(p.x, p.y); else rctx.moveTo(sx - dx / steps, sy - dy / steps);
    rctx.lineTo(sx, sy);
    rctx.stroke();
  }
  p.x = x;
  p.y = y;
}

// Continuously fade the rainbow trail
function fadeLoop() {
  rctx.globalCompositeOperation = 'destination-out';
  rctx.fillStyle = 'rgba(0,0,0,0.04)';
  rctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
  rctx.globalCompositeOperation = 'source-over';
  requestAnimationFrame(fadeLoop);
}
fadeLoop();

// ============================================
// HOLD-TO-SPAWN PARTICLES
// ============================================
function spawnHoldParticle(x, y) {
  // Mix of small sparks and tiny emojis, flying outward in random directions
  const isSpark = Math.random() < 0.6;
  const angle = Math.random() * Math.PI * 2;
  const dist = rand(40, 120);
  const dx = Math.cos(angle) * dist;
  const dy = Math.sin(angle) * dist;

  if (isSpark) {
    const el = document.createElement('div');
    el.className = 'spark';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.background = pickRandom(COLORS);
    el.style.color = el.style.background;
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    canvas.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  } else {
    const el = document.createElement('div');
    el.className = 'mini-emoji';
    el.textContent = pickRandom(EMOJIS);
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.setProperty('--rot', rand(-360, 360) + 'deg');
    canvas.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
}

// ============================================
// POINTER EVENTS — supports multi-touch
// ============================================
function isExitArea(target) {
  return target.closest && (target.closest('[data-exit]') || target.closest('.exit-progress'));
}

gameView.addEventListener('pointerdown', (e) => {
  if (isExitArea(e.target)) return;
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, hue: rand(0, 360), lastSpawn: 0 });
  handleGameTap(e.clientX, e.clientY);
  try { gameView.setPointerCapture(e.pointerId); } catch(err) {}
});

gameView.addEventListener('pointermove', (e) => {
  const p = pointers.get(e.pointerId);
  if (!p) return;
  drawRainbowSegment(p, e.clientX, e.clientY);
});

function endPointer(e) {
  pointers.delete(e.pointerId);
}
gameView.addEventListener('pointerup', endPointer);
gameView.addEventListener('pointercancel', endPointer);
gameView.addEventListener('pointerleave', endPointer);

// Hold-to-spawn loop: every ~80ms, emit a particle for each active pointer
setInterval(() => {
  const now = Date.now();
  pointers.forEach(p => {
    if (now - p.lastSpawn >= 80) {
      spawnHoldParticle(p.x, p.y);
      p.lastSpawn = now;
      // Quieter blip while holding so it doesn't get overwhelming
      if (Math.random() < 0.25) playBlip();
    }
  });
}, 80);

// ============================================
// PREVENT ACCIDENTAL EXITS
// ============================================
// Prevent context menu (long press menu)
document.addEventListener('contextmenu', e => e.preventDefault());
// Prevent pinch zoom
document.addEventListener('gesturestart', e => e.preventDefault());
// Prevent pull-to-refresh
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
// Wake lock (keep screen on)
async function keepAwake() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}
}
document.addEventListener('click', keepAwake, { once: true });
document.addEventListener('visibilitychange', () => { if (!document.hidden) keepAwake(); });
</script>
</body>
</html>
