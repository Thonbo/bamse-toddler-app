<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vesters App">
<meta name="theme-color" content="#FFB300">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">
<title>Vesters App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
  html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; background: #000; font-family: 'Roboto Flex', 'Roboto', system-ui, sans-serif; }
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700;8..144,900&display=swap');

  /* ===== MATERIAL 3 EXPRESSIVE TOKENS =====
     Based on M3 spec: color roles, shape scale, type scale, elevation, state layers
     Tuned to the "Expressive" variant for playful, child-friendly tone */
  :root {
    /* Color roles — vibrant primary container palette */
    --m3-primary: #FFB300;
    --m3-on-primary: #1F1300;
    --m3-primary-container: #FFD600;
    --m3-on-primary-container: #261A00;

    --m3-secondary: #E91E63;
    --m3-on-secondary: #FFFFFF;
    --m3-secondary-container: #FF1744;
    --m3-on-secondary-container: #FFFFFF;

    --m3-tertiary: #2962FF;
    --m3-on-tertiary: #FFFFFF;
    --m3-tertiary-container: #2962FF;
    --m3-on-tertiary-container: #FFFFFF;

    --m3-quaternary-container: #00C853;
    --m3-on-quaternary-container: #FFFFFF;
    --m3-quinary-container: #AA00FF;
    --m3-on-quinary-container: #FFFFFF;

    --m3-surface: #FFF8E7;
    --m3-on-surface: #1F1B13;
    --m3-surface-dim: #E6DFCC;
    --m3-surface-bright: #FFFCF5;

    /* Shape scale */
    --m3-shape-xs: 4px;
    --m3-shape-sm: 8px;
    --m3-shape-md: 12px;
    --m3-shape-lg: 16px;
    --m3-shape-xl: 28px;
    --m3-shape-xxl: 36px;

    /* Elevation (dp → shadow) */
    --m3-elev-1: 0 1px 2px rgba(0,0,0,0.30), 0 1px 3px 1px rgba(0,0,0,0.15);
    --m3-elev-2: 0 1px 2px rgba(0,0,0,0.30), 0 2px 6px 2px rgba(0,0,0,0.15);
    --m3-elev-3: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.30);

    /* Motion — M3 Expressive easing */
    --m3-easing-spatial: cubic-bezier(0.42, 1.67, 0.21, 0.90);
    --m3-easing-emphasized: cubic-bezier(0.20, 0.00, 0.00, 1.00);

    /* Legacy game palette (used in tap game, unchanged) */
    --red: #FF1744;
    --blue: #2962FF;
    --yellow: #FFD600;
    --green: #00C853;
    --purple: #AA00FF;
    --orange: #FF6D00;
  }

  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }

  /* ===== MENU — Material 3 Expressive ===== */
  .menu { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: clamp(12px, 2vh, 32px); padding: clamp(12px, 3vw, 32px);
    background: var(--m3-surface);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,179,0,0.18), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(41,98,255,0.12), transparent 45%);
  }

  /* M3 type scale — display-large, expressive variant */
  .title {
    font-family: 'Roboto Flex', sans-serif;
    font-variation-settings: 'opsz' 144, 'wght' 900, 'wdth' 125;
    font-size: clamp(28px, 5vh, 56px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--m3-on-surface);
    text-align: center;
    display: flex;
    flex-direction: row;
    align-items: baseline;
    justify-content: center;
    gap: 0.2em;
    flex-wrap: wrap;
  }
  .title .accent {
    color: var(--m3-secondary-container);
    font-variation-settings: 'opsz' 144, 'wght' 900, 'wdth' 100;
    font-style: italic;
  }
  .title .sub {
    flex-basis: 100%;
    font-size: 0.28em;
    font-variation-settings: 'opsz' 14, 'wght' 500, 'wdth' 100;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-top: 4px;
  }

  /* Default: portrait — 2-col grid, game spans bottom */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 520px;
    flex: 1;
    align-content: center;
  }
  .grid .tile.game { grid-column: span 2; aspect-ratio: 2.4 / 1; }

  /* Landscape: 5 tiles in one row, fills viewport height */
  @media (orientation: landscape) {
    .grid {
      grid-template-columns: repeat(5, 1fr);
      max-width: min(100%, calc(100vh * 4));
      gap: clamp(8px, 1.5vw, 16px);
    }
    .grid .tile,
    .grid .tile.game {
      grid-column: span 1;
      aspect-ratio: 1;
    }
    .grid .tile.game { aspect-ratio: 1; flex-direction: column; }
    .grid .tile.game .emoji { font-size: clamp(36px, 7vh, 56px); }
    .grid .tile.game .label { font-size: clamp(16px, 2.5vh, 22px); }
  }

  /* M3 Filled Card with state layer */
  .tile {
    position: relative;
    aspect-ratio: 1;
    border: none;
    border-radius: var(--m3-shape-xl);
    cursor: pointer;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    padding: clamp(12px, 2vh, 20px);
    box-shadow: var(--m3-elev-1);
    transition:
      transform 200ms var(--m3-easing-spatial),
      box-shadow 200ms var(--m3-easing-emphasized),
      border-radius 250ms var(--m3-easing-spatial);
    font-family: inherit;
    text-align: left;
    min-width: 0;
  }
  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background: currentColor;
    opacity: 0;
    transition: opacity 100ms var(--m3-easing-emphasized);
    pointer-events: none;
  }
  .tile:hover { box-shadow: var(--m3-elev-2); }
  .tile:hover::before { opacity: 0.08; }
  .tile:active {
    transform: scale(0.96);
    border-radius: var(--m3-shape-xxl);
    box-shadow: var(--m3-elev-1);
  }
  .tile:active::before { opacity: 0.12; }

  .tile .emoji {
    font-size: clamp(36px, 8vh, 56px);
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.12));
  }
  .tile .label {
    font-variation-settings: 'opsz' 24, 'wght' 700, 'wdth' 110;
    font-size: clamp(14px, 2.5vh, 22px);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  /* M3 color roles per tile */
  .tile.video1 { background: var(--m3-secondary-container); color: var(--m3-on-secondary-container); }
  .tile.video2 { background: var(--m3-tertiary-container); color: var(--m3-on-tertiary-container); }
  .tile.video3 { background: var(--m3-quaternary-container); color: var(--m3-on-quaternary-container); }
  .tile.video4 { background: var(--m3-quinary-container); color: var(--m3-on-quinary-container); }
  .tile.game   { background: var(--m3-primary-container); color: var(--m3-on-primary-container); }

  /* Portrait-only override for the game tile (wide format) */
  @media (orientation: portrait) {
    .tile.game { flex-direction: row; align-items: center; justify-content: center; gap: 16px; padding: 24px; }
    .tile.game .emoji { font-size: 48px; }
    .tile.game .label { font-size: 28px; font-variation-settings: 'opsz' 32, 'wght' 900, 'wdth' 110; }
  }

  /* M3 Snackbar — install prompt */
  .install-toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: #1F1B13; color: #FFF8E7;
    padding: 12px 8px 12px 20px;
    border-radius: var(--m3-shape-xs);
    box-shadow: var(--m3-elev-3);
    display: none; align-items: center; gap: 8px;
    font-family: 'Roboto Flex', sans-serif;
    font-variation-settings: 'opsz' 14, 'wght' 500;
    font-size: 14px;
    max-width: 90vw; z-index: 200;
  }
  .install-toast button {
    border: none; background: transparent;
    color: var(--m3-primary-container);
    font-family: inherit; font-size: 14px;
    font-variation-settings: 'opsz' 14, 'wght' 700;
    padding: 8px 12px; border-radius: var(--m3-shape-sm);
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .install-toast button:active { background: rgba(255, 214, 0, 0.12); }

  /* Offline indicator chip */
  .offline-chip {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    background: #1F1B13; color: #FFD600;
    padding: 6px 14px; border-radius: 999px;
    font-family: 'Roboto Flex', sans-serif;
    font-variation-settings: 'opsz' 12, 'wght' 600;
    font-size: 12px;
    display: none; align-items: center; gap: 6px;
    z-index: 200;
    box-shadow: var(--m3-elev-2);
  }
  .offline-chip::before { content: ''; width: 8px; height: 8px; background: #FFD600; border-radius: 50%; }
  body.is-offline .offline-chip { display: flex; }

  /* Version badge — small, subtle, bottom-right corner of menu */
  .version-badge {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-family: 'Roboto Flex', monospace;
    font-variation-settings: 'opsz' 10, 'wght' 500;
    font-size: 10px;
    color: var(--m3-on-surface);
    opacity: 0.35;
    letter-spacing: 0.1em;
    pointer-events: none;
  }

  /* ===== VIDEO VIEW ===== */
  .video-view { position: absolute; inset: 0; background: #000; display: none; }
  .video-view.active { display: block; }
  .video-view iframe { width: 100%; height: 100%; border: 0; }
  /* Tap-blocker overlay so toddler taps don't hit YouTube UI */
  .video-blocker { position: absolute; inset: 0; z-index: 5; }

  /* ===== GAME VIEW ===== */
  .game-view { position: absolute; inset: 0; display: none; background: #0a0a1a; overflow: hidden; touch-action: none; }
  .game-view.active { display: block; }
  .game-canvas { position: absolute; inset: 0; pointer-events: none; }
  .rainbow-canvas { position: absolute; inset: 0; pointer-events: none; filter: url(#rainbowDisplace); will-change: filter; }
  /* Hidden SVG host for the displacement filter — never rendered, only referenced */
  .filter-host { position: absolute; width: 0; height: 0; overflow: hidden; pointer-events: none; }
  .game-bg { position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,23,68,0.4), transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(41,98,255,0.4), transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255,214,0,0.3), transparent 60%),
                #0a0a1a;
  }

  /* Tiny particles emitted while finger is held */
  .spark { position: absolute; pointer-events: none; width: 16px; height: 16px; border-radius: 50%; transform: translate(-50%, -50%); animation: sparkFly 1s ease-out forwards; box-shadow: 0 0 12px currentColor; }
  @keyframes sparkFly {
    0% { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.1); opacity: 0; }
  }
  .mini-emoji { position: absolute; pointer-events: none; font-size: 28px; transform: translate(-50%, -50%); animation: miniFly 1.1s ease-out forwards; }
  @keyframes miniFly {
    0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(var(--rot)); opacity: 0; }
  }

  /* ===== EXIT BUTTON (hidden, requires long-press to exit) ===== */
  .exit-zone { position: absolute; top: 0; right: 0; width: 80px; height: 80px; z-index: 100; }
  .exit-progress { position: absolute; top: 12px; right: 12px; width: 56px; height: 56px; border-radius: 50%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 101; }
  .exit-progress.showing { opacity: 1; }
  .exit-progress svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .exit-progress circle { fill: none; stroke: white; stroke-width: 4; }
  .exit-progress .track { stroke: rgba(255,255,255,0.2); }
  .exit-progress .fill { stroke-dasharray: 157; stroke-dashoffset: 157; transition: stroke-dashoffset 0.05s linear; }
  .exit-icon { position: absolute; color: white; font-size: 22px; font-weight: 700; }

  /* ===== ANIMATIONS (game taps) ===== */
  .pop { position: absolute; pointer-events: none; font-size: 80px; animation: popOut 1.2s ease-out forwards; transform: translate(-50%, -50%); }
  @keyframes popOut {
    0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
    20% { transform: translate(-50%, -50%) scale(1.4) rotate(20deg); }
    100% { transform: translate(-50%, -50%) scale(1.8) rotate(360deg); opacity: 0; }
  }
  .bubble { position: absolute; pointer-events: none; border-radius: 50%; transform: translate(-50%, -50%); animation: bubbleUp 1.5s ease-out forwards; box-shadow: inset -8px -8px 16px rgba(0,0,0,0.2), inset 4px 4px 8px rgba(255,255,255,0.5); }
  @keyframes bubbleUp {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
    50% { opacity: 0.9; }
    100% { transform: translate(-50%, calc(-50% - 200px)) scale(1.3); opacity: 0; }
  }
  .confetti { position: absolute; pointer-events: none; width: 14px; height: 14px; transform: translate(-50%, -50%); animation: confettiFall 1.4s ease-out forwards; }
  @keyframes confettiFall {
    0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(720deg); opacity: 0; }
  }
  .firework { position: absolute; pointer-events: none; width: 8px; height: 8px; border-radius: 50%; transform: translate(-50%, -50%); animation: fireworkBurst 0.9s ease-out forwards; }
  @keyframes fireworkBurst {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; box-shadow: 0 0 20px currentColor; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.3); opacity: 0; box-shadow: 0 0 40px currentColor; }
  }

  .back-btn { position: absolute; top: 12px; left: 12px; z-index: 100; width: 56px; height: 56px; border-radius: 50%; background: rgba(0,0,0,0.5); color: white; border: 2px solid rgba(255,255,255,0.3); font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="app">

  <!-- MENU -->
  <div class="menu" id="menu">
    <h1 class="title">
      <span>Vesters</span>
      <span class="accent">App</span>
      <span class="sub">Tap to play</span>
    </h1>
    <div class="version-badge">v9</div>
    <div class="grid" id="grid">
      <button class="tile game" id="gameBtn"><span class="emoji">🎮</span><span class="label">Tap Game</span></button>
    </div>
  </div>

  <!-- VIDEO VIEW -->
  <div class="video-view" id="videoView">
    <iframe id="ytFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <div class="video-blocker"></div>
    <div class="exit-zone" data-exit></div>
    <div class="exit-progress" id="exitProgress1">
      <svg viewBox="0 0 60 60"><circle class="track" cx="30" cy="30" r="25"/><circle class="fill" cx="30" cy="30" r="25"/></svg>
      <span class="exit-icon">×</span>
    </div>
  </div>

  <!-- GAME VIEW -->
  <div class="game-view" id="gameView">
    <div class="game-bg"></div>

    <!-- Hidden SVG filter: feTurbulence is the displacement *map* (never drawn);
         feDisplacementMap warps the rainbow canvas using R for X, G for Y.
         The map self-evolves via animated baseFrequency + seed but does not translate. -->
    <svg class="filter-host" aria-hidden="true">
      <defs>
        <filter id="rainbowDisplace" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
          <feTurbulence id="rainbowTurb" type="fractalNoise" baseFrequency="0.006 0.008" numOctaves="2" seed="1" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="85" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>

    <canvas class="rainbow-canvas" id="rainbowCanvas"></canvas>
    <div class="game-canvas" id="gameCanvas"></div>
    <div class="exit-zone" data-exit></div>
    <div class="exit-progress" id="exitProgress2">
      <svg viewBox="0 0 60 60"><circle class="track" cx="30" cy="30" r="25"/><circle class="fill" cx="30" cy="30" r="25"/></svg>
      <span class="exit-icon">×</span>
    </div>
  </div>

  <!-- Install prompt (M3 snackbar) -->
  <div class="install-toast" id="installToast" role="status">
    <span>Install Vesters App for offline use</span>
    <button id="installBtn">Install</button>
    <button id="installDismiss" aria-label="Dismiss">✕</button>
  </div>

  <!-- Offline indicator -->
  <div class="offline-chip">Offline — videos need WiFi</div>

</div>

<script>
// ============================================
// CONFIG — replace these YouTube IDs with your own
// To get an ID: from https://www.youtube.com/watch?v=ABC123 the ID is "ABC123"
// ============================================
const VIDEOS = [
  { id: '4m_qHSRSeIU', title: 'Jodlesangen', emoji: '🎵' },
  { id: 'MrdvKm9Nx7M', title: 'Brum Brum',   emoji: '🚗' },
  { id: '21ZYqu7AC1c', title: 'Okay Okay',   emoji: '🎺' },
  { id: 'JYT8D9nMGH4', title: 'Bamses Sang', emoji: '🐻' },
];

// ============================================
// SOUND (Web Audio — fun beeps & boops, no files needed)
// ============================================
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playBlip() {
  if (!audioCtx) return;
  const notes = [523, 587, 659, 698, 784, 880, 988, 1047]; // C major scale
  const freq = notes[Math.floor(Math.random() * notes.length)];
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = ['sine', 'triangle', 'square'][Math.floor(Math.random() * 3)];
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}
function playMenuBlip() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(660, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.2);
}

// ============================================
// VIEWS
// ============================================
const menu = document.getElementById('menu');
const videoView = document.getElementById('videoView');
const gameView = document.getElementById('gameView');
const ytFrame = document.getElementById('ytFrame');

function showMenu() {
  menu.style.display = 'flex';
  videoView.classList.remove('active');
  gameView.classList.remove('active');
  ytFrame.src = ''; // stop video
  // Clear rainbow trail and any active pointers
  if (typeof rctx !== 'undefined') rctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  if (typeof pointers !== 'undefined') pointers.clear();
}
function showVideo(idx) {
  initAudio();
  const id = VIDEOS[idx].id;
  // playlist=ID makes a single video loop; loop=1 + playlist=ID is the trick
  ytFrame.src = `https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&controls=0&modestbranding=1&rel=0&playsinline=1&iv_load_policy=3`;
  menu.style.display = 'none';
  videoView.classList.add('active');
  tryFullscreen();
}
function showGame() {
  initAudio();
  menu.style.display = 'none';
  gameView.classList.add('active');
  tryFullscreen();
}

// Build video tiles dynamically from VIDEOS array
const grid = document.getElementById('grid');
const gameBtnEl = document.getElementById('gameBtn');
VIDEOS.forEach((v, i) => {
  const btn = document.createElement('button');
  btn.className = `tile video${i + 1}`;
  btn.dataset.video = i;
  btn.innerHTML = `<span class="emoji">${v.emoji}</span><span class="label">${v.title}</span>`;
  btn.addEventListener('click', () => { initAudio(); playMenuBlip(); showVideo(i); });
  grid.insertBefore(btn, gameBtnEl);
});
gameBtnEl.addEventListener('click', () => { initAudio(); playMenuBlip(); showGame(); });

// ============================================
// FULLSCREEN
// ============================================
function tryFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  // Lock to landscape — best on tablets and prevents the kid accidentally rotating
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(()=>{});
  }
}

// ============================================
// EXIT — long press top-right corner for 2 seconds
// ============================================
const EXIT_DURATION = 2000;
document.querySelectorAll('[data-exit]').forEach(zone => {
  let timer = null;
  let startTime = 0;
  let raf = null;
  const view = zone.closest('.video-view, .game-view');
  const progress = view.querySelector('.exit-progress');
  const fill = progress.querySelector('.fill');

  function start(e) {
    e.preventDefault();
    startTime = Date.now();
    progress.classList.add('showing');
    function tick() {
      const elapsed = Date.now() - startTime;
      const pct = Math.min(elapsed / EXIT_DURATION, 1);
      fill.style.strokeDashoffset = 157 * (1 - pct);
      if (pct < 1) raf = requestAnimationFrame(tick);
      else { showMenu(); cleanup(); }
    }
    raf = requestAnimationFrame(tick);
  }
  function cleanup() {
    cancelAnimationFrame(raf);
    progress.classList.remove('showing');
    fill.style.strokeDashoffset = 157;
  }
  zone.addEventListener('touchstart', start, { passive: false });
  zone.addEventListener('mousedown', start);
  ['touchend', 'touchcancel', 'mouseup', 'mouseleave'].forEach(ev => zone.addEventListener(ev, cleanup));
});

// ============================================
// GAME — animations on tap
// ============================================
const canvas = document.getElementById('gameCanvas');
const COLORS = ['#FF1744', '#2962FF', '#FFD600', '#00C853', '#AA00FF', '#FF6D00', '#00E5FF', '#F50057'];
const EMOJIS = ['⭐', '🌟', '💫', '✨', '🎈', '🎉', '🐶', '🐱', '🐰', '🦄', '🐸', '🐵', '🦋', '🌈', '🎨', '🚀', '🍭', '🎂', '⚽', '🏀'];

function rand(min, max) { return Math.random() * (max - min) + min; }
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function spawnEffect(x, y) {
  const type = Math.floor(Math.random() * 4);
  if (type === 0) spawnPop(x, y);
  else if (type === 1) spawnBubble(x, y);
  else if (type === 2) spawnConfetti(x, y);
  else spawnFirework(x, y);
}

function spawnPop(x, y) {
  const el = document.createElement('div');
  el.className = 'pop';
  el.textContent = pickRandom(EMOJIS);
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  canvas.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function spawnBubble(x, y) {
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'bubble';
    const size = rand(40, 90);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = (x + rand(-30, 30)) + 'px';
    el.style.top = y + 'px';
    el.style.background = pickRandom(COLORS);
    el.style.animationDelay = (i * 80) + 'ms';
    canvas.appendChild(el);
    setTimeout(() => el.remove(), 1700);
  }
}

function spawnConfetti(x, y) {
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.background = pickRandom(COLORS);
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    const angle = rand(0, Math.PI * 2);
    const dist = rand(80, 200);
    el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    canvas.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

function spawnFirework(x, y) {
  const color = pickRandom(COLORS);
  for (let i = 0; i < 16; i++) {
    const el = document.createElement('div');
    el.className = 'firework';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.background = color;
    el.style.color = color;
    const angle = (i / 16) * Math.PI * 2;
    const dist = rand(100, 180);
    el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    canvas.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
}

function handleGameTap(x, y) {
  spawnEffect(x, y);
  playBlip();
}

// ============================================
// RAINBOW TRAIL CANVAS (drag to draw)
// ============================================
const rainbowCanvas = document.getElementById('rainbowCanvas');
const rctx = rainbowCanvas.getContext('2d');

function resizeRainbow() {
  const dpr = window.devicePixelRatio || 1;
  rainbowCanvas.width  = window.innerWidth  * dpr;
  rainbowCanvas.height = window.innerHeight * dpr;
  rainbowCanvas.style.width  = window.innerWidth  + 'px';
  rainbowCanvas.style.height = window.innerHeight + 'px';
  // Reset any prior transform before re-applying DPR scale
  rctx.setTransform(1, 0, 0, 1, 0, 0);
  rctx.scale(dpr, dpr);
  rctx.lineCap = 'round';
  rctx.lineJoin = 'round';
  // Keep the offscreen blur canvas in sync with the rainbow canvas
  if (typeof blurCanvas !== 'undefined') {
    blurCanvas.width  = rainbowCanvas.width;
    blurCanvas.height = rainbowCanvas.height;
  }
}
resizeRainbow();
// Resize on both resize and orientationchange. orientationchange fires before
// the viewport is updated on some Android builds, so we re-run on the next frame too.
window.addEventListener('resize', resizeRainbow);
window.addEventListener('orientationchange', () => {
  resizeRainbow();
  requestAnimationFrame(resizeRainbow);
  setTimeout(resizeRainbow, 250);
});

// Per-pointer state: position + hue offset so each finger gets its own rainbow
const pointers = new Map(); // pointerId -> { x, y, hue }

// ============================================
// FILTER ANIMATION — slow self-evolution only (no map translation)
// ============================================
const turbEl = document.getElementById('rainbowTurb');

// Master animation loop: animates turbulence (slow self-evolution)
let filterTime = 0;
function animateFilter() {
  filterTime += 1;

  // Slow self-evolution of the noise itself (the field shape breathes)
  const fx = 0.006 + Math.sin(filterTime * 0.003) * 0.0008;
  const fy = 0.008 + Math.cos(filterTime * 0.0025) * 0.0008;
  turbEl.setAttribute('baseFrequency', `${fx.toFixed(5)} ${fy.toFixed(5)}`);

  // Slowly increment seed for continuous evolution (every ~120 frames)
  if (filterTime % 120 === 0) {
    turbEl.setAttribute('seed', (filterTime / 120) % 1000);
  }

  requestAnimationFrame(animateFilter);
}
animateFilter();

// ============================================
// PER-FRAME DOT DRAWING — replaces line-segment trail
// While a pointer is down, draw a colored dot at its position each frame.
// Dot size pulses with a sine wave; hue cycles continuously.
// History fades via alpha decay + accumulating blur.
// ============================================

// Offscreen canvas used to apply blur each frame to the existing history,
// then we redraw it back onto the rainbow canvas at reduced alpha.
const blurCanvas = document.createElement('canvas');
const bctx = blurCanvas.getContext('2d');
// Initial sync (subsequent resizes are handled inside resizeRainbow above)
blurCanvas.width = rainbowCanvas.width;
blurCanvas.height = rainbowCanvas.height;

// Tunables
const FADE_ALPHA = 0.985;   // each frame, history is redrawn at 98.5% alpha (slow fade)
const BLUR_PX    = 0.6;     // tiny blur per frame; accumulates over many frames

let frameCounter = 0;
function drawDots() {
  frameCounter++;
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;

  // STEP 1: snapshot the current canvas history into the offscreen blur canvas
  bctx.setTransform(1, 0, 0, 1, 0, 0); // reset (no DPR scale on blur canvas)
  bctx.clearRect(0, 0, blurCanvas.width, blurCanvas.height);
  bctx.filter = `blur(${BLUR_PX}px)`;
  bctx.drawImage(rainbowCanvas, 0, 0);
  bctx.filter = 'none';

  // STEP 2: clear the rainbow canvas and redraw the (blurred) history at reduced alpha
  rctx.setTransform(1, 0, 0, 1, 0, 0); // work in raw pixel space for the redraw
  rctx.clearRect(0, 0, rainbowCanvas.width, rainbowCanvas.height);
  rctx.globalAlpha = FADE_ALPHA;
  rctx.drawImage(blurCanvas, 0, 0);
  rctx.globalAlpha = 1;

  // STEP 3: restore DPR transform for crisp dot drawing in CSS pixel space
  rctx.scale(dpr, dpr);

  // STEP 4: draw a fresh dot for each active pointer
  const sinePulse = (Math.sin(frameCounter * 0.15) + 1) * 0.5; // 0..1
  const baseRadius = 10 + sinePulse * 8; // 10..18 px

  pointers.forEach(p => {
    p.hue = (p.hue + 3) % 360;
    rctx.fillStyle = `hsl(${p.hue}, 100%, 60%)`;
    rctx.shadowBlur = 16;
    rctx.shadowColor = `hsl(${p.hue}, 100%, 70%)`;
    rctx.beginPath();
    rctx.arc(p.x, p.y, baseRadius, 0, Math.PI * 2);
    rctx.fill();
  });
  rctx.shadowBlur = 0;

  requestAnimationFrame(drawDots);
}
drawDots();

// ============================================
// HOLD-TO-SPAWN PARTICLES
// ============================================
function spawnHoldParticle(x, y) {
  // Mix of small sparks and tiny emojis, flying outward in random directions
  const isSpark = Math.random() < 0.6;
  const angle = Math.random() * Math.PI * 2;
  const dist = rand(40, 120);
  const dx = Math.cos(angle) * dist;
  const dy = Math.sin(angle) * dist;

  if (isSpark) {
    const el = document.createElement('div');
    el.className = 'spark';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.background = pickRandom(COLORS);
    el.style.color = el.style.background;
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    canvas.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  } else {
    const el = document.createElement('div');
    el.className = 'mini-emoji';
    el.textContent = pickRandom(EMOJIS);
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.setProperty('--rot', rand(-360, 360) + 'deg');
    canvas.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
}

// ============================================
// POINTER EVENTS — supports multi-touch
// ============================================
function isExitArea(target) {
  return target.closest && (target.closest('[data-exit]') || target.closest('.exit-progress'));
}

gameView.addEventListener('pointerdown', (e) => {
  if (isExitArea(e.target)) return;
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, hue: rand(0, 360), lastSpawn: 0 });
  handleGameTap(e.clientX, e.clientY);
  try { gameView.setPointerCapture(e.pointerId); } catch(err) {}
});

gameView.addEventListener('pointermove', (e) => {
  const p = pointers.get(e.pointerId);
  if (!p) return;
  // Per-frame dot loop reads p.x / p.y directly — just update position here
  p.x = e.clientX;
  p.y = e.clientY;
});

function endPointer(e) {
  pointers.delete(e.pointerId);
}
gameView.addEventListener('pointerup', endPointer);
gameView.addEventListener('pointercancel', endPointer);
gameView.addEventListener('pointerleave', endPointer);

// Hold-to-spawn loop: every ~80ms, emit a particle for each active pointer
setInterval(() => {
  const now = Date.now();
  pointers.forEach(p => {
    if (now - p.lastSpawn >= 80) {
      spawnHoldParticle(p.x, p.y);
      p.lastSpawn = now;
      // Quieter blip while holding so it doesn't get overwhelming
      if (Math.random() < 0.25) playBlip();
    }
  });
}, 80);

// ============================================
// PREVENT ACCIDENTAL EXITS
// ============================================
// Prevent context menu (long press menu)
document.addEventListener('contextmenu', e => e.preventDefault());
// Prevent pinch zoom
document.addEventListener('gesturestart', e => e.preventDefault());
// Prevent pull-to-refresh
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
// Wake lock (keep screen on)
async function keepAwake() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}
}
document.addEventListener('click', keepAwake, { once: true });
document.addEventListener('visibilitychange', () => { if (!document.hidden) keepAwake(); });

// ============================================
// SERVICE WORKER — offline app shell
// ============================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      // Check for updates every time the page loads
      reg.update().catch(()=>{});
      // When a new SW takes control, reload once so the user sees the new version
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
    }).catch(err => console.warn('SW registration failed:', err));
  });
}

// PWA install prompt — show a small toast on the menu when installable
let deferredInstall = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstall = e;
  const toast = document.getElementById('installToast');
  if (toast) toast.style.display = 'flex';
});
document.getElementById('installBtn')?.addEventListener('click', async () => {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  await deferredInstall.userChoice;
  deferredInstall = null;
  document.getElementById('installToast').style.display = 'none';
});
document.getElementById('installDismiss')?.addEventListener('click', () => {
  document.getElementById('installToast').style.display = 'none';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installToast').style.display = 'none';
});

// Offline detection — toggles a chip and could be used to grey out video tiles
function updateOnlineStatus() {
  document.body.classList.toggle('is-offline', !navigator.onLine);
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();
</script>
